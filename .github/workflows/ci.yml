name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"

      - name: Validate monitor configuration
        run: python -m netpulse.cli validate-config --config config/monitors.yml

      - name: Lint Python
        run: ruff check .

      - name: Check Python formatting
        run: ruff format --check .

      - name: Test Python
        run: pytest

      - name: Generate and validate deterministic public JSON
        run: |
          python -m netpulse.cli demo --output frontend/public/data
          python scripts/prepare_pages_data.py frontend/public/data

      - name: Configure Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Test frontend
        working-directory: frontend
        run: npm run test -- --run

      - name: Build frontend for GitHub Pages
        working-directory: frontend
        run: npm run build
